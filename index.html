<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🤗 For Bidwiya Ji ✨</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Poppins:wght@400;700&family=Playfair+Display:ital,wght@1,700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #9d4edd; /* Royal Purple */
            --secondary: #ff9e00; /* Gold */
            --gold: #f5b742; /* Premium Gold */
            --bg-dark: #020202;
            --parchment: rgba(253, 241, 219, 0.95); /* Opened Letter Background */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            height: 100dvh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            background: var(--bg-dark);
            font-family: 'Poppins', sans-serif;
            overflow: hidden; position: fixed;
        }

        /* --- AUTOMATIC FLOATING FLOWER GARDEN --- */
        #magic-layer { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .flower-drop {
            position: fixed; top: -50px; z-index: 2;
            animation: fall-rotate linear forwards;
            opacity: 0.7;
        }
        @keyframes fall-rotate {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            100% { transform: translateY(110dvh) rotate(720deg); opacity: 0; }
        }

        /* --- THE OPENED LOVE LETTER CARD --- */
        .opened-letter {
            background: var(--parchment); 
            padding: 45px 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 0 50px rgba(255,158,0,0.2), inset 0 0 100px rgba(0,0,0,0.1);
            width: 90%; max-width: 420px; min-height: 560px;
            display: flex; flex-direction: column; justify-content: center;
            z-index: 10; position: relative;
            border: 1px solid rgba(0,0,0,0.1);
            overflow: hidden;
            transition: 0.5s ease;
        }
        
        /* Edge Burn Effect */
        .opened-letter::before, .opened-letter::after {
            content: ''; position: absolute; left: 0; width: 100%; height: 10px;
            background: radial-gradient(circle, rgba(139,69,19,0.2) 0%, transparent 70%);
        }
        .opened-letter::before { top: 0; }
        .opened-letter::after { bottom: 0; }

        /* Golden Royal Seal */
        .seal-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; }
        .royal-seal {
            width: 100%; height: 100%; background: #c9184a; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Playfair Display', serif; font-weight: bold; font-size: 4.5rem; color: var(--gold);
            border: 6px solid #a4133c;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: pulse-seal 2s infinite alternate;
        }
        @keyframes pulse-seal { from { box-shadow: 0 10px 15px rgba(201,24,74,0.3); } to { box-shadow: 0 10px 30px rgba(201,24,74,0.6); } }

        h1 { 
            font-family: 'Dancing Script', cursive; 
            font-size: 2.6rem; 
            color: #d63031; 
            margin-bottom: 15px;
            position: relative;
        }

        /* Golden Bidwiya Ji Signature */
        .golden-signature {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: #c9184a;
            position: relative;
            z-index: 1;
        }
        
        .golden-signature::before {
            content: "Bidwiya Ji";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            filter: blur(10px);
            opacity: 0.7;
            background: linear-gradient(90deg, #ff9e00, #fff, #ff9e00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: golden-glow 2s ease-in-out infinite alternate;
        }

        @keyframes golden-glow {
            0% { opacity: 0.5; filter: blur(8px); }
            100% { opacity: 1; filter: blur(15px); }
        }

        #msg-box { 
            font-size: 1.02rem; color: #333; min-height: 130px; 
            line-height: 1.7; margin-bottom: 30px; 
            font-weight: 400; font-family: 'Poppins', sans-serif;
        }

        .btn-group { display: flex; flex-direction: column; gap: 18px; width: 100%; }
        .btn {
            padding: 18px; font-size: 1.05rem; font-weight: 700; border: none;
            border-radius: 100px; cursor: pointer; transition: 0.3s;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        #yesBtn { 
            background: linear-gradient(45deg, #00b894, #55efc4); 
            color: white; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1), 0 0 15px rgba(0,184,148,0.2);
        }
        #noBtn { 
            background: rgba(0,0,0,0.05); color: #777; 
            border: 1.5px solid #ccc;
        }

        /* --- BIG CUTE TEDDY --- */
        #teddy-container {
            position: fixed; bottom: 35px; right: 30px; z-index: 50;
            display: flex; flex-direction: column; align-items: center;
        }
        #teddy-bubble {
            background: #fff; color: var(--primary); padding: 12px 18px;
            border-radius: 20px; font-size: 0.9rem; font-weight: 800;
            margin-bottom: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none; position: relative;
        }
        #teddy-companion { font-size: 5rem; cursor: pointer; filter: drop-shadow(0 0 15px var(--secondary)); }

        /* --- SURPRISE VIEW --- */
        .gift-box { font-size: 8.5rem; cursor: pointer; animation: bounceGift 1s infinite; margin: 30px 0; }
        @keyframes bounceGift { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1) rotate(5deg); } }

        .special-link-btn {
            display: inline-block; margin-top: 30px; padding: 16px 38px;
            background: linear-gradient(45deg, #7b2cbf, #ff9e00);
            color: white; text-decoration: none; border-radius: 50px;
            font-weight: 700; border: 1.5px solid var(--gold);
            animation: pulse-glow-special 2s infinite;
        }
        @keyframes pulse-glow-special { 0% { box-shadow: 0 0 10px var(--secondary); } 50% { box-shadow: 0 0 25px var(--gold); } 100% { box-shadow: 0 0 10px var(--secondary); } }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <div id="magic-layer"></div>

    <div id="teddy-container">
        <div id="teddy-bubble">Sorry re... Bidwiya 🥺</div>
        <div id="teddy-companion" onclick="teddySurprise(event)">🧸</div>
    </div>

    <div class="opened-letter" id="mainCard">
        <div id="askStage">
            <div class="seal-wrap"><div class="royal-seal">B</div></div>
            <h1>Sorry re <br>💝 <span class="golden-signature">Bidwiya Ji</span> ❤️‍🩹</h1>
            <div id="msg-box"></div>
            <div class="btn-group">
                <button class="btn" id="yesBtn" onclick="goToGift()">Khoma Korlam ✨</button>
                <button class="btn" id="noBtn" onmouseover="shiftBtn()" onclick="shiftBtn()">Korbo Na 🙄</button>
            </div>
        </div>

        <div id="gift-scene" style="display: none;">
            <h1 style="color: var(--primary);">Open Letter Surprise</h1>
            <p style="color: #555;">বক্সটিতে ক্লিক করুন ম্যাডাম জী! 😊</p>
            <div class="gift-box" onclick="openGift()">🎁</div>
        </div>

        <div id="final-view" style="display: none;">
            <h1 style="color: var(--primary); font-size: 2.2rem;">ধন্যবাদ ম্যাডাম জী! 🌹</h1>
            <div style="font-size: 4.5rem; margin: 25px 0;">🌹🍫🧁</div>
            <p style="font-weight: 500; color: #333; font-size: 1.1rem; line-height: 1.8;">
                অয়নকে ক্ষমা করার জন্য অনেক ধন্যবাদ। <br>
                তোর পরীক্ষা অনেক ভালো হোক! <br>
                <span style="color: #ff9e00; font-family: 'Parisienne'; font-size: 2.2rem; display: block; margin-top: 10px;">Best of Luck re! 🥰</span>
            </p>
            <a href="https://domical-pamela-lambently.ngrok-free.dev" target="_blank" class="special-link-btn">
                Another Surprise 💎
            </a>
        </div>
    </div>

    <script>
        let musicStarted = false;
        const msg = "আমি জানি তোকে অনেক বিরক্ত করেছি। সরি রে সবকিছুর জন্য! আর এত মেসেজ করার জন্যেও সরি... কী করব? মেসেজ না করে থাকতেই পারি না। আমাকে মাফ করে দিস! আর নেক্সট পরীক্ষার জন্য অনেক শুভকামনা রইল। 😊";
        let idx = 0;

        function handleGlobalClick(e) {
            if(!musicStarted) {
                document.getElementById('bg-music').play().catch(() => {});
                musicStarted = true;
            }
            createTapSparkle(e);
        }

        function startTyping() {
            if (idx < msg.length) {
                document.getElementById('msg-box').innerHTML += msg.charAt(idx);
                idx++;
                setTimeout(startTyping, 45);
            }
        }

        function shiftBtn() {
            const btn = document.getElementById('noBtn');
            const x = (Math.random() - 0.5) * 200;
            const y = (Math.random() - 0.5) * 150;
            btn.style.transform = `translate(${x}px, ${y}px)`;
        }

        function teddySurprise(e) {
            e.stopPropagation();
            const bubble = document.getElementById('teddy-bubble');
            bubble.style.display = 'block';
            setTimeout(() => bubble.style.display = 'none', 3000);
            
            // Spawn Heart Burst
            for(let i=0; i<10; i++) setTimeout(() => spawnHeartEffect(e), i*50);
        }

        function goToGift() {
            document.getElementById('askStage').style.display = 'none';
            document.getElementById('gift-scene').style.display = 'block';
        }

        function openGift() {
            document.getElementById('gift-scene').style.display = 'none';
            document.getElementById('final-view').style.display = 'block';
            specialFlowerRain(40);
        }

        function specialFlowerRain(count) {
            const icons = ['✨', '💎', '💜', '👑', '🎉', '🌸', '🌹'];
            for(let i=0; i<count; i++) {
                setTimeout(() => {
                    const drop = document.createElement('div');
                    drop.className = 'flower-drop';
                    drop.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                    drop.style.left = Math.random() * 100 + 'vw';
                    drop.style.fontSize = Math.random() * 20 + 20 + 'px';
                    drop.style.animationDuration = Math.random() * 2 + 3 + 's';
                    drop.style.filter = 'drop-shadow(0 0 5px var(--gold))';
                    document.getElementById('magic-layer').appendChild(drop);
                    setTimeout(() => drop.remove(), 5000);
                }, i * 80);
            }
        }

        function createTapSparkle(e) {
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            const sparkle = document.createElement('div');
            sparkle.innerHTML = '✨';
            sparkle.style.position = 'fixed'; sparkle.style.left = x + 'px'; sparkle.style.top = y + 'px';
            sparkle.style.pointerEvents = 'none'; sparkle.style.zIndex = '100';
            document.body.appendChild(sparkle);
            sparkle.animate([{ transform: 'scale(1) translate(0,0)', opacity: 1 }, { transform: `scale(2) translate(${(Math.random()-0.5)*100}px, -100px)`, opacity: 0 }], 800);
            setTimeout(() => sparkle.remove(), 800);
        }
        
        function spawnHeartEffect(e) {
            const x = (e.clientX || 300) + (Math.random()-0.5)*50;
            const y = (e.clientY || 500) - (Math.random()*50);
            const heart = document.createElement('div');
            heart.innerHTML = ['💖','💕','❤️‍🩹','💜'][Math.floor(Math.random()*4)];
            heart.style.position = 'fixed'; heart.style.left = x + 'px'; heart.style.top = y + 'px';
            heart.style.zIndex = '51'; heart.style.pointerEvents = 'none';
            heart.style.fontSize = Math.random()*20+15+'px';
            document.body.appendChild(heart);
            heart.animate([{ transform: 'scale(0.5) translateY(0)', opacity: 1 }, { transform: 'scale(1.5) translateY(-200px)', opacity: 0 }], 1500);
            setTimeout(() => heart.remove(), 1500);
        }

        // Auto Background Flower Garden
        setInterval(() => {
            const icons = ['🌸', '✨', '⭐', '🌼', '💜', '🌹'];
            const drop = document.createElement('div');
            drop.className = 'flower-drop';
            drop.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.opacity = '0.4';
            drop.style.animationDuration = Math.random()*3+3+'s';
            drop.style.filter = `drop-shadow(0 0 5px ${['#fff', '#ff9e00', '#9d4edd'][Math.floor(Math.random()*3)]})`;
            document.getElementById('magic-layer').appendChild(drop);
            setTimeout(() => drop.remove(), 5000);
        }, 700);

        window.onload = startTyping;
    </script>
</body>
</html>
